name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      # -D warnings intentionally not enabled yet: 37 pre-existing clippy
      # findings across src/ (see ENGINE13_IMPROVEMENT_TASKS.md, "clippy
      # debt"). Re-enable -D warnings in a separate PR once that debt is
      # cleared, otherwise this job would be red by default and stop being
      # a signal for new regressions.
      - run: cargo clippy --workspace

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
