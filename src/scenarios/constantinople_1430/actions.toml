# Patron actions for Constantinople 1430 scenario

# Venice actions (3)
[[patron_actions]]
id = "venice_naval_support"
name = "Венецианский флот"
source_actor_id = "venice"

[patron_actions.available_if]
type = "metric"
metric = "actor:venice.treasury"
operator = "greater"
value = 100.0

[patron_actions.effects]
"actor:byzantium.military_size" = 5.0
"actor:byzantium.cohesion" = 3.0
"actor:venice.treasury" = -50.0

[patron_actions.cost]

[[patron_actions]]
id = "venice_trade_deal"
name = "Торговая сделка"
source_actor_id = "venice"

[patron_actions.available_if]
type = "metric"
metric = "actor:venice.economic_output"
operator = "greater"
value = 60.0

[patron_actions.effects]
"actor:byzantium.economic_output" = 8.0
"global:federation_progress" = 3.0
"actor:venice.economic_output" = -3.0

[patron_actions.cost]
"actor:venice.treasury" = -20.0

[[patron_actions]]
id = "venice_diplomacy"
name = "Венецианская дипломатия"
source_actor_id = "venice"

[patron_actions.available_if]
type = "metric"
metric = "actor:venice.legitimacy"
operator = "greater"
value = 60.0

[patron_actions.effects]
"global:federation_progress" = 5.0
"actor:genoa.cohesion" = 2.0

[patron_actions.cost]
"actor:venice.treasury" = -30.0

