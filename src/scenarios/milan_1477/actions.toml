# Patron actions for Milan 1477 scenario — Milan is the player actor.
# Actions represent diplomacy, marriage ties, bribery, condottieri and
# banking moves available to the Duchy during the regency crisis.

[[patron_actions]]
id = "milan_marriage_venice"
name = "Брачный союз с Венецией"
source_actor_id = "milan"

[patron_actions.available_if]
type = "metric"
metric = "actor:milan.treasury"
operator = "greater"
value = 80.0

[patron_actions.effects]
"actor:venice.cohesion" = 3.0
"actor:milan.legitimacy" = 5.0
"actor:venice.external_pressure" = -3.0

[patron_actions.cost]
"actor:milan.treasury" = -60.0

