# Rank bonus rules for Milan 1477 scenario
# Same generic scheme as rome_375/constantinople_1430 - order does not matter, matched by rank

[[rank_bonuses]]
rank = "S"

[[rank_bonuses.effects]]
metric = "economic_output"
delta = 0.5

[[rank_bonuses.effects]]
metric = "legitimacy"
floor = 20.0

[[rank_bonuses]]
rank = "A"

[[rank_bonuses.effects]]
metric = "economic_output"
