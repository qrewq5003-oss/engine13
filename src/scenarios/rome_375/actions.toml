metric = "family:family_connections"
operator = "greater"
value = 15.0

[patron_actions.effects]
"family:family_connections" = 5.0
"actor:rome.legitimacy" = 2.0

[patron_actions.cost]
"family:family_wealth" = -6.0

[[patron_actions]]
id = "fund_defense"
name = "Вложить в оборону"

[patron_actions.available_if]
type = "metric"
metric = "family:family_wealth"
operator = "greater"
value = 20.0

[patron_actions.effects]
"family:family_influence" = 3.0
"actor:rome.military_quality" = 2.0

[patron_actions.cost]
"family:family_wealth" = -10.0

