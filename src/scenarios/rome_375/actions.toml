# Patron actions for Rome 375 scenario

[[patron_actions]]
id = "expand_network"
name = "Расширить связи"

[patron_actions.available_if]
type = "metric"
metric = "family:family_wealth"
operator = "greater"
value = 10.0

[patron_actions.effects]
"family:family_connections" = 6.0

[patron_actions.cost]
"family:family_wealth" = -4.0

[[patron_actions]]
id = "gather_information"
name = "Собрать информацию"

[patron_actions.available_if]
type = "always"

[patron_actions.effects]
"family:family_knowledge" = 6.0

[patron_actions.cost]
"family:family_wealth" = -2.0

[[patron_actions]]
id = "invest_wealth"
name = "Вложить средства"

[patron_actions.available_if]
type = "metric"
metric = "family:family_wealth"
operator = "greater"
value = 20.0

[patron_actions.effects]
"family:family_wealth" = 5.0

[patron_actions.cost]
"family:family_connections" = -3.0

[[patron_actions]]
id = "build_reputation"
