operator = "greater"
value = 10.0

[patron_actions.effects]
"family:family_knowledge" = 10.0

[patron_actions.cost]
"family:family_wealth" = -6.0

[[patron_actions]]
id = "lay_low"
name = "Затаиться"

[patron_actions.available_if]
type = "always"

[patron_actions.effects]
"family:family_wealth" = 3.0

[patron_actions.cost]
"family:family_influence" = -2.0

[[patron_actions]]
id = "support_city"
name = "Поддержать город"

[patron_actions.available_if]
type = "metric"
metric = "family:family_wealth"
operator = "greater"
value = 15.0

[patron_actions.effects]
"family:family_influence" = 4.0
"actor:rome.economic_output" = 2.0
